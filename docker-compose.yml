version: '3.8'

services:
  # 网关服务（3 个实例）
  gateway-1:
    build: .
    container_name: gateway-1
    ports:
      - "8081:8080"
      - "9091:9090"
    environment:
      - NODE_ID=gateway-1
      - REDIS_HOST=redis
    networks:
      - gateway-net
    depends_on:
      - redis
    restart: unless-stopped

  gateway-2:
    build: .
    container_name: gateway-2
    ports:
      - "8082:8080"
      - "9092:9090"
    environment:
      - NODE_ID=gateway-2
      - REDIS_HOST=redis
    networks:
      - gateway-net
    depends_on:
      - redis
    restart: unless-stopped

  gateway-3:
    build: .
    container_name: gateway-3
    ports:
      - "8083:8080"
      - "9093:9090"
    environment:
      - NODE_ID=gateway-3
      - REDIS_HOST=redis
    networks:
      - gateway-net
    depends_on:
      - redis
    restart: unless-stopped

  # Redis（节点注册与状态同步）
  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    ports:
      - "6379:6379"
    networks:
      - gateway-net
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Prometheus（指标采集）
  prometheus:
    image: prom/prometheus:latest
    container_name: gateway-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - gateway-net
    restart: unless-stopped

  # Grafana（可视化）
  grafana:
    image: grafana/grafana:latest
    container_name: gateway-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/gateway-dashboard.json:/var/lib/grafana/dashboards/gateway-dashboard.json
    networks:
      - gateway-net
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  gateway-net:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
