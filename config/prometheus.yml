global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Gateway 节点
  - job_name: 'gateway'
    static_configs:
      - targets:
          - 'gateway-1:9090'
          - 'gateway-2:9090'
          - 'gateway-3:9090'
        labels:
          cluster: 'gateway-cluster'

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
